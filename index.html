<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servidor básico</title>
</head>
<body>
  <h1>Hola</h1>
  <p id="msg">Cargando…</p>
  <button type="button" id="btn">Pulsa</button>

  <script>
    document.getElementById("msg").textContent = "La página y el JavaScript funcionan.";
    document.getElementById("btn").addEventListener("click", function () {
      alert("¡Hola desde JavaScript en el navegador!");
    });
  </script>
</body>
</html>
